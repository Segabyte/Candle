appId: com.candle.app
productName: Candle
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Candle-Setup-${version}.exe
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Candle
